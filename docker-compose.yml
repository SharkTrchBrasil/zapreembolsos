version: '3.8'

services:
  app:
    build: .
    container_name: zapreembolso_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PROJECT_NAME=ZapReembolso API
      - DEBUG=False
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-zapreembolso}
      - WUZAPI_BASE_URL=${WUZAPI_BASE_URL:-http://wuzapi:8080}
      - WUZAPI_USER_TOKEN=${WUZAPI_USER_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: zapreembolso_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-zapreembolso}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
