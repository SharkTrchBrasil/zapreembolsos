version: '3.8'

services:
  app:
    build: .
    container_name: zapreembolso_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=ZapReembolso API
      - DEBUG=False
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres_password@db:5432/zapreembolso
      - WUZAPI_BASE_URL=http://wuzapi:8080
      - WUZAPI_USER_TOKEN=${WUZAPI_USER_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: zapreembolso_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=zapreembolso
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
